# LokMat — GitHub Actions CI
# Per GEMINI.md: GitHub Actions mirror of cloudbuild.yaml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lokmat_test
          POSTGRES_USER: lokmat_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lokmat_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio httpx ruff mypy respx pytest-cov pip-audit

      - name: Dependency vulnerability scan
        run: pip-audit --requirement api/requirements.txt --ignore-vuln PYSEC-2022-42974
        continue-on-error: true

      - name: Lint with ruff
        run: ruff check api/ --output-format=github

      - name: Type check
        run: mypy api/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests (Unit & Integration)
        run: |
          pytest tests/ -v --tb=short \
            --cov=api \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          GEMINI_API_KEY: test-key
          DATABASE_URL: postgresql+asyncpg://lokmat_user:test_password@localhost:5432/lokmat_test
          REDIS_URL: redis://localhost:6379/0
          TESTING: "1"
          FIREBASE_AUTH_ENABLED: "false"
          JWT_SECRET: "test-secret-for-ci-only"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        continue-on-error: true

  e2e-tests:
    name: E2E Tests (Playwright + axe-core)
    runs-on: ubuntu-latest
    # Run against the live production URL — no need to spin up backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright + axe-playwright
        run: |
          npm install -D @playwright/test axe-playwright
          npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E + Accessibility tests (WCAG 2.1 AA)
        run: npx playwright test --project=chromium-desktop
        working-directory: frontend
        env:
          CI: true
          E2E_BASE_URL: https://lokmat-495121.web.app
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 3
