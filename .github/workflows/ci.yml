# LokMat — GitHub Actions CI
# Per GEMINI.md: GitHub Actions mirror of cloudbuild.yaml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lokmat_test
          POSTGRES_USER: lokmat_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio httpx ruff mypy respx

      - name: Lint with ruff
        run: ruff check api/ --output-format=github

      - name: Type check
        run: mypy api/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
        env:
          GEMINI_API_KEY: test-key
          DATABASE_URL: postgresql+asyncpg://lokmat_user:test_password@localhost:5432/lokmat_test
          REDIS_URL: redis://localhost:6379/0

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          GEMINI_API_KEY: test-key
          DATABASE_URL: postgresql+asyncpg://lokmat_user:test_password@localhost:5432/lokmat_test
          REDIS_URL: redis://localhost:6379/0

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        continue-on-error: true

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright
        run: |
          npm install -D @playwright/test @axe-core/playwright
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium-desktop
        env:
          CI: true
          E2E_BASE_URL: http://localhost:5173
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
