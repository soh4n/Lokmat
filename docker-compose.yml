# LokMat — Local Development Stack
# Per GEMINI.md: docker-compose for local dev only

services:
  # --- PostgreSQL (Cloud SQL equivalent) ---
  db:
    image: postgres:16-alpine
    container_name: lokmat-db
    environment:
      POSTGRES_DB: lokmat
      POSTGRES_USER: lokmat_user
      POSTGRES_PASSWORD: lokmat_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lokmat_user -d lokmat"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis (Memorystore equivalent) ---
  redis:
    image: redis:7-alpine
    container_name: lokmat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- FastAPI Backend ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lokmat-api
    ports:
      - "8000:8000"
    env_file:
      - api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lokmat_user:lokmat_dev_password@db:5432/lokmat
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Frontend (Vite dev server) ---
  frontend:
    image: node:20-alpine
    container_name: lokmat-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
